document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    const templateData = JSON.parse(templateEl.textContent);
    const pages = templateData.pages;
    const entryId = templateData.entry;
    const pageIds = Object.keys(pages);

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : {};

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    // Per-page prep: substitute UUIDs, strip SRI/crossorigin (blob URLs from a
    // file:// document inherit a null origin, so crossorigin forces a CORS
    // fetch that SRI then rejects — the manifest bytes are ours; SRI protects
    // against CDN compromise, not this), and inject the page's own
    // window.__resources + the click interceptor into <head>. slice() rather
    // than replace() keeps us clear of $-pattern substitution.
    function resourcesFor(id) {
      var map = {};
      var list = extResources[id] || [];
      for (var k = 0; k < list.length; k++) {
        if (blobUrls[list[k].uuid]) map[list[k].id] = blobUrls[list[k].uuid];
      }
      return map;
    }
    for (const id of pageIds) {
      let t = pages[id];
      for (const uuid of uuids) t = t.split(uuid).join(blobUrls[uuid]);
      t = t.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');
      // The click interceptor owns every anchor click (not a <base target>):
      // a blanket <base target="_parent"> would also redirect form submissions
      // and tear down the wrapper. Non-# links navigate the parent to the
      // anchor's resolved href; #/… routes forward to the parent's hash only
      // when the id is one of this bundle's own pages (author #/… links from
      // an in-page hash router are left to the scroll path so they don't yank
      // the user to the entry page); plain #frag scrolls in place.
      // composedPath + getAttribute('target') handle SVG <a> and shadow-DOM
      // anchors, which closest()/IDL .target get wrong.
      var headContent = 'window.__resources = ' + JSON.stringify(resourcesFor(id)) + ';' +
        (pageIds.length > 1 ?
          'window.__bundler_pages = ' + JSON.stringify(pageIds) + ';' +
          'document.addEventListener("click", function(e){' +
            'if (e.button !== 0 || e.metaKey || e.ctrlKey || e.shiftKey || e.altKey || e.defaultPrevented) return;' +
            'var a = null, p = e.composedPath ? e.composedPath() : [e.target];' +
            'for (var j = 0; j < p.length && !a; j++) {' +
              'var n = p[j], tn = n && n.tagName;' +
              'if (tn === "A" || tn === "a" || tn === "AREA") a = n;' +
            '}' +
            'if (!a && e.target.closest) a = e.target.closest("a, area");' +
            'if (!a || a.hasAttribute("download")) return;' +
            'var tg = a.getAttribute("target");' +
            'if (tg && tg !== "_self") return;' +
            'var h = a.getAttribute("href") || a.getAttribute("xlink:href");' +
            'if (!h || /^javascript:/i.test(h)) return;' +
            'if (h.charAt(0) !== "#") {' +
              'if (!tg) { var b = document.querySelector("base[target]"); if (b && b.getAttribute("target") !== "_self") return; }' +
              'e.preventDefault();' +
              'if (/^(?:[a-z][a-z0-9+.-]*:|\\/\\/)/i.test(h)) parent.location.assign(h);' +
              'return;' +
            '}' +
            'e.preventDefault();' +
            'if (h.slice(0, 2) === "#/") {' +
              'var c = h.indexOf(":", 2);' +
              'var pid = c < 0 ? h.slice(2) : h.slice(2, c);' +
              'try { pid = decodeURIComponent(pid); } catch(err) {}' +
              'if (window.__bundler_pages.indexOf(pid) >= 0) { parent.location.hash = h; return; }' +
            '}' +
            'var t = h.length > 1 ? document.getElementById(h.slice(1)) : null;' +
            'if (t) t.scrollIntoView({behavior:"smooth"});' +
            'else scrollTo({top:0, behavior:"smooth"});' +
          '});' : '');
      // Defuse any script end-tag sequence in the content (resource ids, page
      // ids) before wrapping — same escape level as every sibling JSON island.
      var headScript = '<script>' +
        headContent.split('</' + 'script').join('<\\/' + 'script') +
        '</' + 'script>';
      // Inject after <head> so the DOCTYPE stays first; prepending the script
      // would push the parser into quirks mode. DOMParser always emits a <head>
      // (synthesizing one if the source HTML omitted it) but may carry
      // attributes through, so match the full opening tag.
      var headOpen = t.match(/<head[^>]*>/i);
      if (headOpen) {
        var hi = headOpen.index + headOpen[0].length;
        t = t.slice(0, hi) + headScript + t.slice(hi);
      }
      pages[id] = t;
    }

    setStatus('Rendering...');

    if (pageIds.length === 1) {
      // Single page: the pre-crawl render path. Parse the template and swap the
      // root element. Scripts inserted via DOMParser/replaceWith are inert per
      // spec — re-create each with createElement so they execute, awaiting
      // onload for src scripts to preserve ordering (React before ReactDOM
      // before Babel before text/babel).
      var template = pages[entryId];
      const doc = new DOMParser().parseFromString(template, 'text/html');
      document.documentElement.replaceWith(doc.documentElement);
      const dead = Array.from(document.scripts);
      for (const old of dead) {
        const s = document.createElement('script');
        for (const a of old.attributes) s.setAttribute(a.name, a.value);
        s.textContent = old.textContent;
        // text/babel scripts with a src: fetch and inline. transformScriptTags
        // does XHR against the src, but blob:null/ from a file:// origin is
        // silently dropped. Inlining makes it a plain inline babel script,
        // which transformScriptTags handles unconditionally.
        if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
          try {
            const r = await fetch(s.src);
            s.textContent = await r.text();
            s.removeAttribute('src');
          } catch (e) {}
        }
        // Non-executable script types (text/babel, application/json, …) are
        // data blocks per spec: the browser never fetches src and never fires
        // load/error, so awaiting would hang forever.
        const exec = !s.type || s.type === 'module' || /(java|ecma)script/i.test(s.type);
        const p = (s.src && exec) ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
        old.replaceWith(s);
        if (p) await p;
      }
      // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
      // which fired before we swapped the document. Trigger manually if present.
      if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
        window.Babel.transformScriptTags();
      }
      return;
    }

    // Multi-page: render into a full-viewport srcdoc iframe so each page runs
    // in its own realm while staying same-origin with the parent (so asset
    // blob URLs load and parent.location is writable).
    var frame = document.createElement('iframe');
    frame.id = '__bundler_frame';
    frame.setAttribute('style', 'position:fixed;inset:0;width:100%;height:100%;border:0;background:#fff');
    document.body.appendChild(frame);

    function decode(s) {
      try { return decodeURIComponent(s); } catch (e) { return s; }
    }
    function route() {
      var h = (location.hash || '');
      if (h.slice(0, 2) !== '#/') return { id: entryId, anchor: '' };
      h = h.slice(2);
      var i = h.indexOf(':');
      return i < 0 ? { id: decode(h), anchor: '' }
                   : { id: decode(h.slice(0, i)), anchor: decode(h.slice(i + 1)) };
    }

    var current = null;
    var navGen = 0;
    function navigate() {
      var r = route();
      var id = Object.prototype.hasOwnProperty.call(pages, r.id) ? r.id : entryId;
      if (current === id) {
        // Same-page anchor change: the iframe's own hash handles this, so
        // normally we don't reach here. If we do (e.g. a programmatic
        // parent.location.hash change), nudge the iframe.
        var cw = frame.contentWindow;
        if (!cw) return;
        var el = r.anchor && cw.document.getElementById(r.anchor);
        if (el) el.scrollIntoView({ behavior: 'smooth' });
        else cw.scrollTo({ top: 0, behavior: 'smooth' });
        return;
      }
      current = id;
      var gen = ++navGen;
      frame.onload = function() {
        // One-shot: an iframe-internal navigation (form submit, page JS
        // location.href=) re-fires onload with the same gen; after that the
        // iframe may be cross-origin, and cw.* access would throw.
        frame.onload = null;
        if (gen !== navGen) return;
        var cw = frame.contentWindow;
        try { cw.document.title && (document.title = cw.document.title); } catch (e) {}
        var splash = document.getElementById('__bundler_thumbnail') ||
                     document.getElementById('__bundler_placeholder');
        if (splash) splash.remove();
        if (loading) loading.remove();
        var el = r.anchor && cw.document.getElementById(r.anchor);
        if (el) el.scrollIntoView();
        else cw.scrollTo(0, 0);
      };
      frame.srcdoc = pages[id];
    }

    window.addEventListener('hashchange', navigate);
    navigate();
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

{padding-left:38px;background:rgba(0,0,0,.025)}\n.nyp-sub-rows{display:none}\n.nyp-sub-rows.show{display:contents}\n.chat{margin-top:28px;background:var(--surface);border:1px solid var(--line);border-radius:var(--r);overflow:hidden}\n.thread{padding:22px 22px 10px;display:flex;flex-direction:column;gap:13px;max-height:430px;overflow-y:auto}\n.msg{display:flex;gap:10px;max-width:86%}\n.msg.a{align-self:flex-start}\n.msg.u{align-self:flex-end;flex-direction:row-reverse}\n.av{width:30px;height:30px;border-radius:50%;flex-shrink:0;display:grid;place-items:center;font-size:12px;font-weight:800;background:var(--navy);color:#fff}\n.msg.u .av{display:none}\n.bub{padding:11px 14px;border-radius:15px;font-size:14.5px;line-height:1.5}\n.msg.a .bub{background:var(--paper);color:var(--navy);border-bottom-left-radius:5px}\n.msg.a .bub b{font-weight:800;color:var(--goldDeep)}\n.msg.u .bub{background:var(--navy);color:#fff;border-bottom-right-radius:5px;font-weight:600}\n.composer{border-top:1px solid var(--line);padding:13px 15px 15px;background:var(--surface)}\n.quick{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:11px}\n.quick:empty{display:none;margin:0}\n.qchip{font-size:13px;font-weight:700;color:var(--navy);background:var(--surface);border:1.5px solid var(--line);border-radius:var(--rpill);padding:8px 14px;transition:.15s}\n.qchip:hover{border-color:var(--navy);background:var(--goldWash)}\n.qchip.on{border-color:var(--gold);background:var(--goldWash);color:var(--goldDeep)}\n.qchip.go{background:var(--gold);color:var(--navy2);border-color:var(--gold)}\n.qchip.go:hover{filter:brightness(.96)}\n.cbar{display:flex;align-items:center;gap:8px;background:var(--paper);border:1.5px solid var(--line);border-radius:var(--rpill);padding:5px 5px 5px 16px;transition:.15s}\n.cbar:focus-within{border-color:var(--navy)}\n.cbar input{flex:1;border:0;background:transparent;outline:none;font:inherit;font-size:14.5px;color:var(--ink)}\n.cbar input::placeholder{color:#B9B2A2}\n.csend{width:38px;height:38px;border-radius:50%;background:var(--navy);color:#fff;font-size:14px;flex-shrink:0;display:grid;place-items:center;transition:.15s}\n.csend:hover{background:var(--navy2)}\n.csend.ready{width:auto;border-radius:999px;padding:0 16px;font-size:13px;font-weight:800;background:var(--gold);color:var(--navy2)}\n.csend.ready:hover{background:var(--gold);filter:brightness(.96)}\n.typing{display:flex;gap:4px;align-items:center;padding:14px 15px}\n.typing i{width:6px;height:6px;border-radius:50%;background:var(--ink2);display:block;animation:tdot 1s infinite}\n.typing i:nth-child(2){animation-delay:.15s}\n.typing i:nth-child(3){animation-delay:.3s}\n@keyframes tdot{0%,60%,100%{opacity:.3;transform:translateY(0)}30%{opacity:1;transform:translateY(-3px)}}\n@keyframes msgin{from{transform:translateY(5px)}to{transform:none}}\n.msg.app{animation:msgin .2s ease}\n.srch{display:inline-flex;align-items:center;gap:8px;font-weight:700;color:var(--navy)}\n.srch .pulse{width:8px;height:8px}\n</style>\n</head>\n<body>\n\n\n<div class=\"top\"><div class=\"logo\"><span class=\"dot\"></span>Pacer</div></div>\n\n<div class=\"stage\">\n  <div class=\"col\">\n    <h1 class=\"headline\">Built for runners<br><span class=\"ac\">who know what they want.</span></h1>\n\n    <div class=\"chat\" id=\"chat\">\n      <div class=\"thread\" id=\"thread\"></div>\n      <div class=\"composer\" id=\"composer\">\n        <div class=\"quick\" id=\"quick\"></div>\n        <div class=\"cbar\"><input id=\"cin\" autocomplete=\"off\" placeholder=\"Type your answer…\" oninput=\"liveType()\" onkeydown=\"if(event.key==='Enter')chatSend()\"><button class=\"csend\" id=\"csend\" onclick=\"chatSend()\" aria-label=\"Send\">➤</button></div>\n      </div>\n    </div>\n\n    <div class=\"order\" id=\"order\">\n      <div class=\"order-hd\"><span class=\"ttl\">Order details</span><span class=\"prog\" id=\"prog\">0 of 5</span></div>\n      <div class=\"row\" id=\"row-shoe\"><span class=\"dot\"></span><span class=\"k\">Shoe</span><div class=\"body\"><div class=\"v-pending\" id=\"o-shoe\">—</div></div></div>\n      <div class=\"row\" id=\"row-size\"><span class=\"dot\"></span><span class=\"k\">Size</span><div class=\"body\"><div class=\"v-pending\" id=\"o-size\">—</div></div></div>\n      <div class=\"row\" id=\"row-colors\"><span class=\"dot\"></span><span class=\"k\">Colors</span><div class=\"body\"><div class=\"v-pending\" id=\"o-colors\">—</div></div></div>\n      <div class=\"row\" id=\"row-zip\"><span class=\"dot\"></span><span class=\"k\">Ship to</span><div class=\"body\"><div class=\"v-pending\" id=\"o-zip\">—</div></div></div>\n      <div class=\"row\" id=\"row-deliver\"><span class=\"dot\"></span><span class=\"k\">Deliver by</span><div class=\"body\"><div class=\"v-pending\" id=\"o-deliver\">—</div></div></div>\n      <div class=\"row set rowcombo\" id=\"row-shipdeliver\"><span class=\"dot\"></span><div class=\"combo\"><div class=\"combo-cell\"><span class=\"k\">Ship to</span><div class=\"v-text\" id=\"o2-zip\">—</div></div><div class=\"combo-cell\"><span class=\"k\">Deliver by</span><div class=\"v-text\" id=\"o2-deliver\">—</div></div></div></div>\n    </div>\n\n    <div class=\"results\" id=\"results\">\n      <div class=\"results-hd\"><span class=\"ttl\">Live prices</span><span class=\"scan\" id=\"scan\"></span></div>\n      <div class=\"vlist\" id=\"vlist\"></div>\n    </div>\n  </div>\n</div>\n\n<!-- checkout modal -->\n<div class=\"co-ov\" id=\"checkout\" onclick=\"if(event.target===this)closeCheckout()\">\n  <div class=\"co-card\" role=\"dialog\" aria-modal=\"true\">\n    <button class=\"co-x\" onclick=\"closeCheckout()\" aria-label=\"Close\">✕</button>\n    <div class=\"co-head\"><button class=\"co-back\" onclick=\"closeCheckout()\" aria-label=\"Back\">‹</button><span class=\"co-merch\"><span class=\"co-merch-mark\" id=\"co-merch-mark\">P</span><span id=\"co-merch-name\">Pacer</span></span></div>\n    <div class=\"co-amount\"><b id=\"co-amt\">—</b><span>all-in · USD</span></div>\n\n    <div class=\"co-item\">\n      <span class=\"co-sw\" id=\"co-sw\"></span>\n      <div class=\"co-item-t\"><b id=\"co-shoe\">—</b><span id=\"co-meta\">—</span></div>\n      <span class=\"co-vprice\" id=\"co-price\">—</span>\n    </div>\n\n    <div class=\"co-sec\">Contact</div>\n    <input class=\"co-in\" id=\"co-email\" type=\"email\" placeholder=\"Email\">\n\n    <div class=\"co-sec\">Ship to</div>\n    <input class=\"co-in\" id=\"co-name\" placeholder=\"Full name\">\n    <input class=\"co-in\" id=\"co-addr\" placeholder=\"Address\">\n    <div class=\"co-2\"><input class=\"co-in\" id=\"co-city\" placeholder=\"City\"><input class=\"co-in\" id=\"co-zip\" placeholder=\"ZIP\" inputmode=\"numeric\" maxlength=\"5\"></div>\n\n    <div class=\"co-sec\">Card information</div>\n    <div class=\"co-cardgroup\">\n      <div class=\"co-cardnum\"><input class=\"co-in\" id=\"co-card\" placeholder=\"1234 1234 1234 1234\" inputmode=\"numeric\"><span class=\"co-brands\"><span class=\"co-brand\" style=\"background:#1a1f71\">VISA</span><span class=\"co-brand\" style=\"background:#eb001b\">MC</span><span class=\"co-brand\" style=\"background:#006fcf\">AMEX</span></span></div>\n      <div class=\"co-cardrow\"><input class=\"co-in\" id=\"co-exp\" placeholder=\"MM / YY\"><input class=\"co-in\" id=\"co-cvc\" placeholder=\"CVC\" inputmode=\"numeric\" maxlength=\"4\"></div>\n    </div>\n\n    <div class=\"co-sum\">\n      <div class=\"co-line\"><span>Item</span><span id=\"co-s-item\">—</span></div>\n      <div class=\"co-line\"><span>Tax &amp; shipping</span><span id=\"co-s-ts\">included</span></div>\n      <div class=\"co-line tot\"><span>Total</span><span id=\"co-s-tot\">—</span></div>\n    </div>\n    <button class=\"co-pay\" id=\"co-pay\" onclick=\"payNow()\">Pay <span id=\"co-pay-amt\"></span></button>\n    <p class=\"co-fine\">All-in price — nothing added at checkout.</p>\n    <div class=\"co-poweredby\"><span class=\"co-pb-stripe\">Powered by <b>stripe</b></span><span class=\"co-pb-links\"><a href=\"#\">Terms</a><a href=\"#\">Privacy</a></span></div>\n  </div>\n</div>\n\n<!-- wait & save modal -->\n<div class=\"co-ov\" id=\"waitsave\" onclick=\"if(event.target===this)closeWait()\">\n  <div class=\"co-card\" role=\"dialog\" aria-modal=\"true\">\n    <button class=\"co-x\" onclick=\"closeWait()\" aria-label=\"Close\">✕</button>\n    <div class=\"co-eyebrow\">NameYourPrice </div>\n\n    <div id=\"ws-name\">\n      <div class=\"nyp-top\">\n        <span class=\"nyp-cap\">Your price</span>\n        <div class=\"nyp-unit\" id=\"nyp-unit\">\n          <button class=\"on\" data-u=\"usd\" onclick=\"nypUnit('usd')\">All-in $</button>\n          <button data-u=\"pct\" onclick=\"nypUnit('pct')\">% off MSRP</button>\n        </div>\n      </div>\n      <div class=\"nyp-big\" id=\"nyp-big\">—</div>\n      <p class=\"nyp-fine\">Includes taxes &amp; shipping to <b id=\"nyp-zip\">—</b> · by <b id=\"nyp-date\">—</b></p>\n      <div class=\"nyp-slider\">\n        <input type=\"range\" id=\"nyp-range\" min=\"0\" max=\"100\" value=\"100\" oninput=\"nypSlide(this.value)\">\n        <div class=\"nyp-scale\"><span id=\"nyp-floor\">—</span><span class=\"nyp-today\" id=\"nyp-today\">Today —</span></div>\n      </div>\n      <p class=\"nyp-advice\" id=\"nyp-advice\"></p>\n      <div class=\"nyp-table\" id=\"nyp-table\"></div>\n      <button class=\"co-pay\" onclick=\"wsSubmitPrice()\">Set my price</button>\n    </div>\n\n    <div id=\"ws-confirm\" style=\"display:none\">\n      <div class=\"ws-confhead\"><span class=\"ws-done-ic\">✓</span><p>Price set. We’ll alert you the moment the <b id=\"ws-conf-shoe\">pair</b> hits <b id=\"ws-conf-price\">your price</b>.</p></div>\n\n      <div class=\"ws-detail\">\n        <div class=\"ws-drow\"><span class=\"k\">Shoe</span><span class=\"v\" id=\"ws-d-shoe\">—</span></div>\n        <div class=\"ws-drow\"><span class=\"k\">Color</span><span class=\"v\" id=\"ws-d-color\">—</span></div>\n        <div class=\"ws-drow\"><span class=\"k\">Size</span><span class=\"v\" id=\"ws-d-size\">—</span></div>\n        <div class=\"ws-drow\"><span class=\"k\">Ship to</span><span class=\"v\" id=\"ws-d-zip\">—</span></div>\n        <div class=\"ws-drow\"><span class=\"k\">Deliver by</span><span class=\"v\" id=\"ws-d-deliver\">—</span></div>\n        <div class=\"ws-drow price\"><span class=\"k\">Your price</span><span class=\"v\" id=\"ws-d-price\">—</span></div>\n      </div>\n\n      <div id=\"ws-addcard\">\n        <div class=\"ws-addcard-h\">Add a card — let Pacer close it for you</div>\n        <p class=\"ws-addcard-b\">Pacer automatically buys from your preferred sellers the instant your price clears, and posts a listing where verified suppliers compete for your order.</p>\n        <div class=\"co-cardgroup\" style=\"margin-bottom:0\"><div class=\"co-cardnum\"><input class=\"co-in\" id=\"ws-card\" placeholder=\"1234 1234 1234 1234\" inputmode=\"numeric\"><span class=\"co-brands\"><span class=\"co-brand\" style=\"background:#1a1f71\">VISA</span><span class=\"co-brand\" style=\"background:#eb001b\">MC</span></span></div></div>\n        <button class=\"co-pay\" style=\"margin-top:11px\" onclick=\"wsAddCard()\">Add card &amp; open to sellers</button>\n      </div>\n\n      <div id=\"ws-addcard-done\" style=\"display:none\">\n        <p class=\"ws-addok\">✓ Card added. Pacer will buy the moment your price clears and open your order to verified suppliers.</p>\n      </div>\n\n      <button class=\"ws-back\" onclick=\"closeWait()\">Done</button>\n    </div>\n\n    <p class=\"co-fine\">Free to set a price · no card required to watch.</p>\n  </div>\n</div>\n\n<script>\n/* ---- catalog: enough to pin a SKU + offer real colorways ---- */\nconst CATALOG=[\n  {id:'skyward', brand:'Hoka', name:'Skyward', gens:['X','X2'], kw:['hoka','skyward'],\n    colors:[{n:'Black / White',c:'linear-gradient(135deg,#1c1c1c 50%,#fafafa 50%)'},{n:'Blue / Gold',c:'#1f4e79'},{n:'All Black',c:'#161616'}]},\n  {id:'peg', brand:'Nike', name:'Pegasus', gens:['41','40','39'], kw:['nike','pegasus','peg'],\n    colors:[{n:'Black / White',c:'linear-gradient(135deg,#1c1c1c 50%,#fafafa 50%)'},{n:'Wolf Grey',c:'#8a8f98'},{n:'Volt',c:'#c9e265'}]},\n  {id:'ghost', brand:'Brooks', name:'Ghost', gens:['16','15','14'], kw:['brooks','ghost'],\n    colors:[{n:'Grey / Black',c:'linear-gradient(135deg,#6b7280 50%,#1c1c1c 50%)'},{n:'Navy',c:'#27408b'},{n:'White',c:'#ededed'}]},\n  {id:'speed', brand:'Saucony', name:'Endorphin Speed', gens:['4','3'], kw:['saucony','endorphin','speed'],\n    colors:[{n:'Black',c:'#161616'},{n:'Blue',c:'#2a5db0'},{n:'White',c:'#ededed'}]},\n  {id:'nimbus', brand:'ASICS', name:'Gel-Nimbus', gens:['26','25'], kw:['asics','nimbus'],\n    colors:[{n:'Black',c:'#161616'},{n:'Blue',c:'#2a5db0'},{n:'Cream',c:'#efe6cf'}]},\n  {id:'monster', brand:'On', name:'Cloudmonster', gens:['2','1'], kw:['cloudmonster','cloud monster'],\n    colors:[{n:'Black',c:'#161616'},{n:'White',c:'#ededed'},{n:'Storm',c:'#5b6470'}]},\n];\nconst POPULAR=['peg','ghost','skyward','nimbus','monster'];\n\n/* ---- state ---- */\nconst S={ shoe:null, gens:[], colors:[], gender:\"Men's\", size:null, width:'Standard', zip:null, deliver:null };\nfunction shoeLabel(){ if(!S.shoe)return ''; const g=S.gens.length?(' '+S.gens.slice().sort((a,b)=>S.shoe.gens.indexOf(a)-S.shoe.gens.indexOf(b)).join(' / ')):''; return S.shoe.brand+' '+S.shoe.name+g; }\nconst editing=new Set();\nfunction focusBar(){ document.getElementById('inp').focus(); }\nfunction openField(f){ editing.add(f); render(); const el=document.getElementById(f==='zip'?'zipFld':'sizeSel'); if(el)el.focus(); }\nfunction closeField(f){ editing.delete(f); render(); }\n\n/* ---- date helpers ---- */\nfunction addMonths(n){ const d=new Date(); d.setMonth(d.getMonth()+n); return d; }\nfunction toISO(d){ return d.toISOString().slice(0,10); }\nfunction fmtDate(d){ return d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'}); }\nfunction daysFromNow(d){ return Math.round((d - new Date().setHours(0,0,0,0))/864e5); }\n\n/* ---- parsing ---- */\nfunction findShoe(t){ const low=t.toLowerCase(); return CATALOG.find(s=>s.kw.some(k=>low.includes(k))); }\nfunction findSize(t){ const sm=t.match(/size\\s*(\\d{1,2}(?:\\.5)?)/i); if(sm)return sm[1];\n  const all=[...t.matchAll(/\\b(\\d{1,2}(?:\\.5)?)\\b/g)].map(m=>m[1]); return all.find(n=>{const v=parseFloat(n);return v>=4&&v<=18;})||null; }\nfunction findZip(t){ const m=t.match(/\\b(\\d{5})\\b/); return m?m[1]:null; }\n\n/* ---- live parse from the bar (fires as you type) ---- */\nfunction liveParse(){\n  const t=document.getElementById('inp').value||'';\n  const sh=findShoe(t);\n  if(sh && (!S.shoe || S.shoe.id!==sh.id)){ S.shoe=sh; S.colors=[]; S.gens=[sh.gens[0]]; }\n  // a typed generation (e.g. \"pegasus 40\") selects that gen\n  if(S.shoe){ const g=S.shoe.gens.find(x=>new RegExp('\\\\b'+x.replace(/[-/\\\\^$*+?.()|[\\]{}]/g,'\\\\$&')+'\\\\b','i').test(t)); if(g)S.gens=[g]; }\n  // strip brand + name + gens before reading size/zip\n  let rest=t;\n  if(S.shoe){ const esc=s=>s.replace(/[.*+?^${}()|[\\]\\\\-]/g,'\\\\$&');\n    rest=rest.replace(new RegExp(esc(S.shoe.name),'ig'),' ').replace(new RegExp(esc(S.shoe.brand),'ig'),' ');\n    S.shoe.gens.forEach(g=>{ rest=rest.replace(new RegExp('\\\\b'+esc(g)+'\\\\b','ig'),' '); });\n  }\n  const sz=findSize(rest); if(sz)S.size=sz;\n  const z=findZip(rest); if(z)S.zip=z;\n  render();\n}\nfunction send(){ liveParse(); const inp=document.getElementById('inp'); inp.value=''; inp.focus(); render(); }\nfunction pickHint(id){ S.shoe=CATALOG.find(c=>c.id===id); S.colors=[]; S.gens=[S.shoe.gens[0]]; render(); document.getElementById('inp').focus(); }\nfunction toggleGen(g){ const i=S.gens.indexOf(g); if(i>-1)S.gens.splice(i,1); else S.gens.push(g); render(); }\n\n/* ---- direct edits in the card ---- */\nfunction toggleColor(n){ const i=S.colors.indexOf(n); if(i>-1)S.colors.splice(i,1); else S.colors.push(n); render(); }\nfunction setGender(g){ S.gender=g; render(); }\nfunction setWidth(w){ S.width=w; render(); }\nfunction setSize(v){ S.size=v||null; if(v)editing.delete('size'); render(); }\nfunction setZip(v){ const z=(v||'').replace(/[^0-9]/g,'').slice(0,5); S.zip=z.length===5?z:null;\n  const el=document.getElementById('zipFld'); if(el)el.value=z;\n  if(z.length===5){ editing.delete('zip'); render(); } else { syncMeta(); } }\nfunction setDeliver(v){ if(!v)return; S.deliver=new Date(v+'T00:00:00'); render(); }\n\n/* build the size / zip row bodies in the collapsed → click-to-edit pattern */\nfunction sizeSummary(){ return S.gender+\" · US \"+S.size+(S.width==='Wide'?' · Wide':' · Standard'); }\nfunction renderSizeBody(){\n  const el=document.getElementById('v-size');\n  if(editing.has('size')){\n    let opts='<option value=\"\">US size</option>';\n    for(let n=7;n<=15;n+=0.5){ opts+='<option value=\"'+n+'\"'+(S.size==n?' selected':'')+'>US '+n+'</option>'; }\n    el.innerHTML='<div class=\"sizeline\">'+\n      '<span class=\"seg\"><button class=\"'+(S.gender===\"Men's\"?'on':'')+'\" onclick=\"setGender(\\'Men\\\\\\'s\\')\">Men\\'s</button><button class=\"'+(S.gender===\"Women's\"?'on':'')+'\" onclick=\"setGender(\\'Women\\\\\\'s\\')\">Women\\'s</button></span>'+\n      '<select class=\"misel\" id=\"sizeSel\" onchange=\"setSize(this.value)\">'+opts+'</select>'+\n      '<span class=\"seg\"><button class=\"'+(S.width==='Standard'?'on':'')+'\" onclick=\"setWidth(\\'Standard\\')\">Standard</button><button class=\"'+(S.width==='Wide'?'on':'')+'\" onclick=\"setWidth(\\'Wide\\')\">Wide</button></span>'+\n      (S.size?'<button class=\"donelink\" onclick=\"closeField(\\'size\\')\">Done</button>':'')+\n    '</div>';\n  } else if(S.size){\n    el.innerHTML='<button class=\"v-text\" onclick=\"openField(\\'size\\')\">'+sizeSummary()+'</button>';\n  } else {\n    el.innerHTML='<button class=\"v-pending\" onclick=\"openField(\\'size\\')\">Add your size</button>';\n  }\n}\nfunction renderZipBody(){\n  const el=document.getElementById('v-zip');\n  if(editing.has('zip')){\n    el.innerHTML='<input class=\"zipin\" id=\"zipFld\" inputmode=\"numeric\" maxlength=\"5\" placeholder=\"Ship to\" value=\"'+(S.zip||'')+'\" oninput=\"setZip(this.value)\" onblur=\"if(!S.zip)closeField(\\'zip\\')\">';\n  } else if(S.zip){\n    el.innerHTML='<button class=\"v-text\" onclick=\"openField(\\'zip\\')\">'+S.zip+'</button>';\n  } else {\n    el.innerHTML='<button class=\"v-pending\" onclick=\"openField(\\'zip\\')\">Add a zip code</button>';\n  }\n}\n\n/* lightweight sync (no DOM rebuild) — used while typing in the zip field */\nfunction syncMeta(){\n  document.querySelector('.row[data-f=\"size\"]').classList.toggle('set', !!S.size);\n  document.querySelector('.row[data-f=\"zip\"]').classList.toggle('set', !!S.zip);\n  const done=[S.shoe, S.colors.length>0, S.size, S.zip, S.deliver].filter(Boolean).length;\n  document.getElementById('prog').textContent=done+' of 5';\n  document.getElementById('foot').classList.toggle('on', done===5);\n}\n\n/* ---- render ---- */\nfunction render(){\n  // hint chips (only before a shoe is chosen)\n  const hint=document.getElementById('hint');\n  hint.innerHTML = S.shoe ? '' : POPULAR.map(id=>{const s=CATALOG.find(c=>c.id===id);return '<button class=\"h\" onclick=\"pickHint(\\''+id+'\\')\">'+s.brand+' '+s.name+'</button>';}).join('');\n\n  // shoe row: name left, generation pills right\n  const shoeRow=document.querySelector('.row[data-f=\"shoe\"]'), vShoe=document.getElementById('v-shoe');\n  if(S.shoe){\n    shoeRow.classList.add('set');\n    const pills='<span class=\"gens\">'+S.shoe.gens.map((g,i)=>'<button class=\"gen'+(S.gens.includes(g)?' on':'')+'\" onclick=\"toggleGen(\\''+g+'\\')\">'+g+(i===0?'<span class=\"new\">New</span>':'')+'</button>').join('')+'</span>';\n    vShoe.outerHTML='<div class=\"shoeline\" id=\"v-shoe\"><button class=\"v-text\" onclick=\"focusBar()\">'+S.shoe.brand+' '+S.shoe.name+'</button>'+pills+'</div>';\n  }\n  else { shoeRow.classList.remove('set'); document.getElementById('v-shoe').outerHTML='<button class=\"v-pending\" id=\"v-shoe\" onclick=\"focusBar()\">Type a shoe above</button>'; }\n\n  // colors row\n  const colRow=document.querySelector('.row[data-f=\"color\"]'), vCol=document.getElementById('v-color');\n  if(S.shoe){\n    vCol.innerHTML='<div class=\"sw-prompt\">Select your colors and Pacer will find the lowest price.</div><div class=\"swatches\">'+S.shoe.colors.map(c=>{\n      const on=S.colors.includes(c.n);\n      return '<button class=\"sw'+(on?' on':'')+'\" onclick=\"toggleColor(\\''+c.n.replace(/'/g,\"\\\\'\")+'\\')\"><span class=\"chip\" style=\"background:'+c.c+'\"></span>'+c.n+(on?'<span class=\"tick\">✓</span>':'')+'</button>';\n    }).join('')+'</div>';\n    colRow.classList.toggle('set', S.colors.length>0);\n  } else { vCol.innerHTML='<button class=\"v-pending\" onclick=\"focusBar()\">Pick a shoe first</button>'; colRow.classList.remove('set'); }\n\n  // size + zip rows (collapsed → click to edit)\n  renderSizeBody(); renderZipBody();\n  document.querySelector('.row[data-f=\"size\"]').classList.toggle('set', !!S.size);\n  document.querySelector('.row[data-f=\"zip\"]').classList.toggle('set', !!S.zip);\n\n  // deliver row\n  document.getElementById('dateLabel').textContent = S.deliver ? fmtDate(S.deliver) : '';\n\n  // progress + confirm\n  const done=[S.shoe, S.colors.length>0, S.size, S.zip, S.deliver].filter(Boolean).length;\n  document.getElementById('prog').textContent=done+' of 5';\n  document.getElementById('foot').classList.toggle('on', done===5);\n}\n\n/* ---- vendor price search ---- */\nconst VENDORS=[\n  {n:'Running Warehouse', off:-8},\n  {n:\"Dick's\", off:0},\n  {n:'Zappos', off:6},\n  {n:'Fleet Feet', off:10},\n  {n:'Sports Basement', off:-4},\n];\nconst BASE={skyward:165, peg:100, ghost:110, speed:130, nimbus:125, monster:150};\nlet searchTimers=[];\nfunction pickedColors(){ return (S.colors.length?S.colors:S.shoe.colors.map(c=>c.n)); }\nfunction colorObj(n){ return S.shoe.colors.find(c=>c.n===n)||{n:n,c:'#ccc'}; }\nfunction allIn(vendor, colorIdx){ return BASE[S.shoe.id] + vendor.off + colorIdx*5 + 18; }\nfunction findLowest(){\n  searchTimers.forEach(clearTimeout); searchTimers=[];\n  var res=document.getElementById('results'), list=document.getElementById('vlist'), scan=document.getElementById('scan');\n  res.classList.add('on'); list.innerHTML=''; var _cta=document.getElementById('resultsCta'); if(_cta)_cta.style.display='none';\n  scan.innerHTML='<span class=\"pulse\"></span>Scanning sellers…';\n  res.scrollIntoView({block:'nearest'});\n  searchTimers.push(setTimeout(renderPrices, 1400));\n}\nvar LOWSKU=null; var NYP=[];\nfunction nypIdx(e,i){ e.stopPropagation(); var o=NYP[i]; if(o) openWaitSave({dataset:o}); }\nvar VDOMAIN={\"Running Warehouse\":\"runningwarehouse.com\",\"Dick's\":\"dickssportinggoods.com\",\"Zappos\":\"zappos.com\",\"Fleet Feet\":\"fleetfeet.com\",\"Sports Basement\":\"sportsbasement.com\"};\nfunction affLink(vendorName){ var d=VDOMAIN[vendorName]||(\"google.com/search?q=\"+encodeURIComponent(vendorName)); return \"https://www.\"+d; }\nfunction skuPrice(gen, colorName, vendor){\n  var ci=S.shoe.colors.findIndex(function(x){return x.n===colorName;});\n  var gi=S.shoe.gens.indexOf(gen);\n  return BASE[S.shoe.id] + 18 + vendor.off + ci*5 - gi*10;\n}\nfunction dtoggle(btn){ btn.parentNode.classList.toggle('open'); }\nfunction renderPrices(){\n  var list=document.getElementById('vlist'), scan=document.getElementById('scan');\n  var gens=S.gens.slice().sort(function(a,b){return S.shoe.gens.indexOf(a)-S.shoe.gens.indexOf(b);});\n  var cols=pickedColors();\n  var overall=1e9, oMeta='', oSku=null;\n  NYP=[];\n  function pill(o){ var i=NYP.push(o)-1; return '<button class=\"nypill\" onclick=\"nypIdx(event,'+i+')\">Name your price</button>'; }\n  var modelsHtml=gens.map(function(gen){\n    var genLow=1e9, genSku=null;\n    var colsHtml=cols.map(function(cn){\n      var co=colorObj(cn);\n      var vs=VENDORS.map(function(v){ return {v:v, p:skuPrice(gen,cn,v)}; }).sort(function(a,b){return a.p-b.p;});\n      var skuLow=vs[0].p;\n      var skuObj={v:vs[0].v.n, c:cn, sw:co.c, p:skuLow};\n      if(skuLow<genLow){genLow=skuLow; genSku=skuObj;}\n      if(skuLow<overall){ overall=skuLow; oMeta=S.shoe.name+' '+gen+' · '+cn; oSku=skuObj; }\n      var vendHtml=vs.map(function(o,idx){\n        return '<a class=\"vend\" href=\"'+affLink(o.v.n)+'\" target=\"_blank\" rel=\"noopener\">'+\n          '<span class=\"vn\">'+o.v.n+(idx===0?'<span class=\"lowtag\">Lowest</span>':'')+'</span>'+\n          '<span class=\"vp\">$'+o.p+'<span class=\"va\">all-in</span></span>'+\n          '<span class=\"varrow\">↗</span></a>';\n      }).join('');\n      return '<div class=\"drow lvl2\">'+\n        '<div class=\"dhead\" onclick=\"dtoggle(this)\">'+\n          '<span class=\"dlabel\"><span class=\"dswatch\" style=\"background:'+co.c+'\"></span>'+cn+'</span>'+\n          '<span class=\"dprice\"><span class=\"from\">from</span>$'+skuLow+'</span>'+\n          pill(skuObj)+\n          '<span class=\"dchev\">⌄</span>'+\n        '</div>'+\n        '<div class=\"dbody\">'+vendHtml+'</div>'+\n      '</div>';\n    }).join('');\n    return '<div class=\"drow lvl1\">'+\n      '<div class=\"dhead\" onclick=\"dtoggle(this)\">'+\n        '<span class=\"dlabel\">'+S.shoe.brand+' '+S.shoe.name+' '+gen+'</span>'+\n        '<span class=\"dprice\"><span class=\"from\">from</span>$'+genLow+'</span>'+\n        pill(genSku)+\n        '<span class=\"dchev\">⌄</span>'+\n      '</div>'+\n      '<div class=\"dbody\">'+colsHtml+'</div>'+\n    '</div>';\n  }).join('');\n  LOWSKU=oSku;\n  list.innerHTML='<div class=\"drow lvl0\">'+\n    '<div class=\"dhead\" onclick=\"dtoggle(this)\">'+\n      '<span class=\"dlabel\">Lowest price <span class=\"dsub\">'+oMeta+'</span></span>'+\n      '<span class=\"dprice\">$'+overall+'<span class=\"lowtag\">Lowest</span></span>'+\n      pill(oSku)+\n      '<span class=\"dchev\">⌄</span>'+\n    '</div>'+\n    '<div class=\"dbody\">'+modelsHtml+'</div>'+\n  '</div>';\n  scan.innerHTML=VENDORS.length+' sellers · lowest first';\n  var _c=document.getElementById('resultsCta'); if(_c)_c.style.display='flex';\n  if(window.afterPrices){ var _f=window.afterPrices; window.afterPrices=null; _f(); }\n}\n\n/* ---- checkout modal ---- */\nfunction openCheckout(btn){\n  const v=btn.dataset.v, c=btn.dataset.c, sw=btn.dataset.sw, p=btn.dataset.p;\n  document.getElementById('co-merch-name').textContent=v;\n  document.getElementById('co-merch-mark').textContent=(v||'P').trim().charAt(0).toUpperCase();\n  document.getElementById('co-sw').style.background=sw;\n  document.getElementById('co-shoe').textContent=shoeLabel();\n  document.getElementById('co-meta').textContent=c+' · '+S.gender+\" US \"+S.size+' · '+v;\n  document.getElementById('co-price').textContent='$'+p;\n  document.getElementById('co-amt').textContent='$'+p;\n  document.getElementById('co-s-item').textContent='$'+p;\n  document.getElementById('co-s-tot').textContent='$'+p;\n  const zip=document.getElementById('co-zip'); if(S.zip)zip.value=S.zip;\n  const pay=document.getElementById('co-pay'); pay.classList.remove('done'); pay.innerHTML='Pay <span id=\"co-pay-amt\">$'+p+'</span>';\n  document.getElementById('checkout').classList.add('on');\n  document.body.style.overflow='hidden';\n}\nfunction closeCheckout(){ document.getElementById('checkout').classList.remove('on'); document.body.style.overflow=''; }\nfunction payNow(){\n  const pay=document.getElementById('co-pay');\n  pay.classList.add('done'); pay.textContent='✓ Order placed';\n  setTimeout(closeCheckout, 1100);\n}\ndocument.addEventListener('keydown',e=>{ if(e.key==='Escape'){closeCheckout();closeWait();} });\n\n/* ---- name your price modal ---- */\nlet WS={};\nconst MSRP={skyward:185, peg:140, ghost:140, speed:170, nimbus:165, monster:180};\nfunction lowestPrice(){ return LOWSKU?LOWSKU.p:null; }\nfunction wsMsrp(){ return MSRP[WS.shoe.id]||(BASE[WS.shoe.id]+40); }\nfunction wsToday(gen,color){ var best=1e9; VENDORS.forEach(function(v){ var p=skuPrice(gen,color,v); if(p<best)best=p; }); return best; }\nfunction wsWatch(gen,color){ return Math.round(wsToday(gen,color)*0.9); }\nfunction wsMy(gen,color){\n  var ck=gen+\"|\"+color;\n  if(WS.ov[ck]!=null) return WS.ov[ck];\n  if(WS.ov[gen]!=null) return WS.ov[gen];\n  return Math.round(wsToday(gen,color)*WS.frac);\n}\nfunction nypBigText(){\n  var my=wsMy(WS.headGen,WS.headColor);\n  if(WS.unit===\"pct\"){ var pct=Math.max(0,Math.round((1-my/wsMsrp())*100)); return pct+'<span class=\"u\">% off MSRP</span>'; }\n  return \"$\"+my+'<span class=\"u\">all-in</span>';\n}\nfunction nypAdvice(){\n  var f=WS.frac, allGens=WS.gens.length>=WS.shoe.gens.length;\n  if(f>=0.93) return \"\";\n  if(f>=0.86) return \"Pacer can usually hit this within a few days.\";\n  if(f>=0.80) return \"Going lower — push deliver-by to \"+fmtDate(new Date(Date.now()+14*864e5))+\" so Pacer has time to find it.\";\n  return \"Aggressive target. \"+(allGens?\"\":\"Add older models and \")+\"allow until \"+fmtDate(new Date(Date.now()+28*864e5))+\".\";\n}\nfunction nypNum(v,cls){ return '<span class=\"nyp-num '+cls+'\">$'+v+'</span>'; }\nfunction nypMyCell(scope,val){ return '<input class=\"nyp-myin\" value=\"'+val+'\" data-scope=\"'+scope+'\" inputmode=\"numeric\" onchange=\"nypMy(this)\" onkeydown=\"if(event.key===\\'Enter\\')this.blur()\" onfocus=\"this.select()\">'; }\nfunction genIncluded(g){ return !WS.exGen[g] && WS.colors.some(function(c){ return !WS.exSku[g+\"|\"+c]; }); }\nfunction skuIncluded(g,c){ return !WS.exGen[g] && !WS.exSku[g+\"|\"+c]; }\nfunction nypIncludedSkus(){ var out=[]; WS.gens.forEach(function(g){ if(WS.exGen[g])return; WS.colors.forEach(function(c){ if(!WS.exSku[g+\"|\"+c]) out.push([g,c]); }); }); return out; }\nfunction recomputeHead(){\n  var pool=nypIncludedSkus();\n  if(!pool.length){ WS.gens.forEach(function(g){ WS.colors.forEach(function(c){ pool.push([g,c]); }); }); }\n  var best=null; pool.forEach(function(p){ var pr=wsToday(p[0],p[1]); if(!best||pr<best.p)best={g:p[0],c:p[1],p:pr}; });\n  WS.headGen=best.g; WS.headColor=best.c;\n}\nfunction nypCk(kind,key,on){\n  return '<span class=\"nyp-ck'+(on?\" on\":\"\")+'\" role=\"checkbox\" aria-checked=\"'+(on?\"true\":\"false\")+'\" onclick=\"event.stopPropagation();nypCkToggle(\\''+kind+'\\',\\''+key+'\\')\">'+(on?'<svg width=\"10\" height=\"10\" viewBox=\"0 0 12 12\" fill=\"none\"><path d=\"M2.5 6.3 5 8.6 9.5 3.6\" stroke=\"#fff\" stroke-width=\"1.9\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/></svg>':'')+'</span>';\n}\nfunction nypCkToggle(kind,key){\n  if(kind===\"all\"){ var anyOn=WS.gens.some(genIncluded); if(anyOn){ WS.gens.forEach(function(g){ WS.exGen[g]=true; }); } else { WS.exGen={}; WS.exSku={}; } }\n  else if(kind===\"gen\"){ if(WS.exGen[key]){ delete WS.exGen[key]; } else { WS.exGen[key]=true; } }\n  else if(kind===\"sku\"){ if(WS.exSku[key]){ delete WS.exSku[key]; } else { WS.exSku[key]=true; } }\n  nypRender();\n}\nfunction nypColhd(){ return '<div class=\"nyp-colhd\"><span>Item</span><span>MSRP</span><span>Today</span><span>Watch</span><span>My</span></div>'; }\nfunction nypPrimaryRow(){\n  var t=wsToday(WS.headGen,WS.headColor), w=wsWatch(WS.headGen,WS.headColor), my=wsMy(WS.headGen,WS.headColor);\n  var incGens=WS.gens.filter(genIncluded), anyOn=incGens.length>0, nSku=nypIncludedSkus().length;\n  return '<div class=\"nyp-r'+(WS.open?\" open\":\"\")+(anyOn?\"\":\" off\")+'\">'+\n    '<span class=\"nyp-lbl\">'+\n      nypCk(\"all\",\"\",anyOn)+\n      '<span class=\"nyp-chev\" onclick=\"nypTogglePrimary()\">⌄</span>'+\n      '<span class=\"nyp-txt\" onclick=\"nypTogglePrimary()\">'+WS.shoe.brand+\" \"+WS.shoe.name+'<span class=\"sub\"> · '+(incGens.length?incGens.join(\"/\"):\"none\")+\" · \"+nSku+' SKU'+(nSku===1?\"\":\"s\")+'</span></span>'+\n    '</span>'+\n    nypNum(wsMsrp(),\"nyp-msrp\")+nypNum(t,\"nyp-today2\")+nypNum(w,\"nyp-watch\")+nypMyCell(\"global\",my)+\n  '</div>';\n}\nfunction nypGenRow(g){\n  var on=genIncluded(g);\n  var gt=Math.min.apply(null, WS.colors.map(function(c){return wsToday(g,c);}));\n  var gw=Math.round(gt*0.9);\n  var gmy=(WS.ov[g]!=null)?WS.ov[g]:Math.round(gt*WS.frac);\n  return '<div class=\"nyp-r nyp-lvl1'+(WS.openGen[g]?\" open\":\"\")+(on?\"\":\" off\")+'\">'+\n    '<span class=\"nyp-lbl\">'+\n      nypCk(\"gen\",g,on)+\n      '<span class=\"nyp-chev\" onclick=\"nypToggleGen(\\''+g+'\\')\">⌄</span>'+\n      '<span class=\"nyp-txt\" onclick=\"nypToggleGen(\\''+g+'\\')\">'+WS.shoe.name+\" \"+g+'</span>'+\n    '</span>'+\n    nypNum(wsMsrp(),\"nyp-msrp\")+nypNum(gt,\"nyp-today2\")+nypNum(gw,\"nyp-watch\")+nypMyCell(g,gmy)+\n  '</div>';\n}\nfunction nypColorRow(g,c){\n  var on=skuIncluded(g,c), co=colorObj(c), ct=wsToday(g,c), cw=wsWatch(g,c), cmy=wsMy(g,c);\n  return '<div class=\"nyp-r nyp-lvl2'+(on?\"\":\" off\")+'\">'+\n    '<span class=\"nyp-lbl\">'+\n      nypCk(\"sku\",g+\"|\"+c,on)+\n      '<span class=\"nyp-sw\" style=\"background:'+co.c+'\"></span>'+\n      '<span class=\"nyp-txt\">'+c+'</span>'+\n    '</span>'+\n    nypNum(wsMsrp(),\"nyp-msrp\")+nypNum(ct,\"nyp-today2\")+nypNum(cw,\"nyp-watch\")+nypMyCell(g+\"|\"+c,cmy)+\n  '</div>';\n}\nfunction nypRender(){\n  recomputeHead();\n  var today=wsToday(WS.headGen,WS.headColor), floor=Math.round(today*WS.floorFrac);\n  document.getElementById(\"nyp-today\").textContent=\"Today $\"+today;\n  document.getElementById(\"nyp-floor\").textContent=\"Floor $\"+floor;\n  document.getElementById(\"nyp-big\").innerHTML=nypBigText();\n  document.getElementById(\"nyp-advice\").textContent=nypAdvice();\n  var rows=[nypColhd(), nypPrimaryRow()];\n  if(WS.open){\n    WS.gens.forEach(function(g){\n      rows.push(nypGenRow(g));\n      if(WS.openGen[g]){ WS.colors.forEach(function(c){ rows.push(nypColorRow(g,c)); }); }\n    });\n  }\n  document.getElementById(\"nyp-table\").innerHTML=rows.join(\"\");\n}\nfunction nypTogglePrimary(){ WS.open=!WS.open; nypRender(); }\nfunction nypToggleGen(g){ WS.openGen[g]=!WS.openGen[g]; nypRender(); }\nfunction nypUnit(u){ WS.unit=u; [].slice.call(document.querySelectorAll(\"#nyp-unit button\")).forEach(function(b){ b.classList.toggle(\"on\", b.dataset.u===u); }); nypRender(); }\nfunction nypSlide(val){ WS.frac=WS.floorFrac+(val/100)*(1-WS.floorFrac); WS.ov={}; nypRender(); }\nfunction nypMy(input){\n  var v=parseFloat(input.value); if(isNaN(v)){ nypRender(); return; }\n  var my=Math.max(1, Math.min(wsMsrp(), Math.round(v)));\n  var s=input.dataset.scope;\n  if(s===\"global\"){\n    var today=wsToday(WS.headGen,WS.headColor);\n    var frac=Math.max(WS.floorFrac, Math.min(1, my/today));\n    WS.frac=frac; WS.ov={};\n    document.getElementById(\"nyp-range\").value=Math.round((frac-WS.floorFrac)/(1-WS.floorFrac)*100);\n  } else { WS.ov[s]=my; }\n  nypRender();\n}\nfunction openWaitSave(btn){\n  WS={shoe:S.shoe, gens:S.gens.slice().sort(function(a,b){return S.shoe.gens.indexOf(a)-S.shoe.gens.indexOf(b);}), colors:pickedColors(), unit:\"usd\", frac:1, floorFrac:0.75, ov:{}, open:false, openGen:{}, exGen:{}, exSku:{}};\n  var best=null; WS.gens.forEach(function(g){ WS.colors.forEach(function(c){ var p=wsToday(g,c); if(!best||p<best.p)best={g:g,c:c,p:p}; }); });\n  WS.headGen=best.g; WS.headColor=best.c;\n  document.getElementById(\"nyp-zip\").textContent=S.zip||\"—\";\n  document.getElementById(\"nyp-date\").textContent=S.deliver?fmtDate(S.deliver):\"—\";\n  document.getElementById(\"nyp-range\").value=100;\n  nypUnit(\"usd\");\n  wsReset(); nypRender();\n  document.getElementById(\"waitsave\").classList.add(\"on\");\n  document.body.style.overflow=\"hidden\";\n}\nfunction closeWait(){ document.getElementById(\"waitsave\").classList.remove(\"on\"); document.body.style.overflow=\"\"; }\nfunction wsReset(){\n  document.getElementById(\"ws-name\").style.display=\"\";\n  document.getElementById(\"ws-confirm\").style.display=\"none\";\n  document.getElementById(\"ws-addcard\").style.display=\"\";\n  document.getElementById(\"ws-addcard-done\").style.display=\"none\";\n  const c=document.getElementById(\"ws-card\"); if(c)c.value=\"\";\n}\nfunction wsSubmitPrice(){\n  var my=wsMy(WS.headGen,WS.headColor);\n  var inc=nypIncludedSkus(); var n=inc.length;\n  var incCols=WS.colors.filter(function(c){ return inc.some(function(p){return p[1]===c;}); });\n  document.getElementById(\"ws-conf-shoe\").textContent=shoeLabel();\n  document.getElementById(\"ws-conf-price\").textContent=\"$\"+my;\n  document.getElementById(\"ws-d-shoe\").textContent=shoeLabel();\n  document.getElementById(\"ws-d-color\").textContent=incCols.join(\", \");\n  document.getElementById(\"ws-d-size\").textContent=S.gender+\" · US \"+S.size;\n  document.getElementById(\"ws-d-zip\").textContent=S.zip||\"—\";\n  document.getElementById(\"ws-d-deliver\").textContent=S.deliver?fmtDate(S.deliver):\"—\";\n  document.getElementById(\"ws-d-price\").textContent=\"$\"+my+(n>1?(\" · \"+n+\" SKUs watched\"):\"\");\n  document.getElementById(\"ws-name\").style.display=\"none\";\n  document.getElementById(\"ws-confirm\").style.display=\"\";\n}\nfunction wsAddCard(){\n  document.getElementById(\"ws-addcard\").style.display=\"none\";\n  document.getElementById(\"ws-addcard-done\").style.display=\"\";\n}\n\n/* ---- results CTAs ---- */\nfunction buyNowLowest(){\n  const rows=[...document.querySelectorAll(\"#vlist .vrow\")];\n  rows.map(r=>({r, p:parseInt((r.querySelector(\".vprice\").textContent.match(/\\d+/)||[0])[0])}))\n    .sort((a,b)=>a.p-b.p).slice(0,3).forEach(o=>o.r.classList.add(\"open\"));\n}\nfunction nameYourPriceTop(){ if(LOWSKU) openWaitSave({dataset:LOWSKU}); }\n\n/* ---- conversational flow ---- */\nvar CV={step:null, done:{}};\nfunction thread(){ return document.getElementById(\"thread\"); }\nfunction chatScroll(){ var t=thread(); t.scrollTop=t.scrollHeight; }\nfunction addUser(text){\n  var _o=thread().querySelector(\".msg.u\"); if(_o) _o.remove();\n  var d=documen ||\"\", d.zip);\n  if(!S.deliver) S.deliver=addMonths(1);\n  setRow(\"deliver\", fmtDate(S.deliver), true);\n  setRow(\"colors\", S.shoe?((S.colors&&S.colors.length)?S.colors.join(\", \"):S.shoe.colors.map(function(c){return c.n;}).join(\", \")):\"\", !!S.shoe);\n  var n=[\"shoe\",\"size\",\"zip\",\"deliver\",\"colors\"].filter(function(k){return d[k];}).length;\n  var p=document.getElementById(\"prog\"); if(p) p.textContent=n+\" of 5\";\n  var oz=document.getElementById(\"o2-zip\"); if(oz) oz.textContent=S.zip||\"—\";\n  var od=document.getElementById(\"o2-deliver\"); if(od) od.textContent=S.deliver?fmtDate(S.deliver):\"—\";\n  var ord=document.getElementById(\"order\"); if(ord) ord.classList.toggle(\"collapsed\", orderComplete());\n  updateSend();\n}\nfunction liveType(){\n  const t=document.getElementById('cin').value||'';\n  const sh=findShoe(t);\n  if(sh && (!S.shoe || S.shoe.id!==sh.id)){ S.shoe=sh; S.colors=[]; S.gens=[sh.gens[0]]; }\n  if(S.shoe){ CV.done.shoe=true; CV.done.models=true; }\n  // a typed generation (e.g. \"pegasus 40\") selects that gen\n  if(S.shoe){ const g=S.shoe.gens.find(x=>new RegExp('\\\\b'+x.replace(/[-/\\\\^$*+?.()|[\\]{}]/g,'\\\\$&')+'\\\\b','i').test(t)); if(g)S.gens=[g]; }\n  // strip brand + name + gens before reading size/zip\n  let rest=t;\n  if(S.shoe){ const esc=s=>s.replace(/[.*+?^${}()|[\\]\\\\-]/g,'\\\\$&');\n    rest=rest.replace(new RegExp(esc(S.shoe.name),'ig'),' ').replace(new RegExp(esc(S.shoe.brand),'ig'),' ');\n    S.shoe.gens.forEach(g=>{ rest=rest.replace(new RegExp('\\\\b'+esc(g)+'\\\\b','ig'),' '); });\n  }\n  const sz=findSize(rest); if(sz){S.size=sz; CV.done.size=true;}\n  const z=findZip(rest); if(z){S.zip=z; CV.done.zip=true;}\n  var _tl=t.toLowerCase(); if(_tl.indexOf(\"women\")>-1){S.gender=\"Women\\u2019s\".replace(\"\\u2019\",\"'\"); S.gender=\"Women's\"; CV.done.gender=true;} else if(_tl.indexOf(\"men\")>-1){S.gender=\"Men's\"; CV.done.gender=true;}\n  updateOrder();\n}\n\nfunction startChat(){\n  thread and I'll price each — or just hit ➤ for any color.\", function(){ renderColorQuick(); });\n  setPlaceholder(\"Tap colorways, then hit ➤ to continue\");\n}\nfunction renderColorQuick(){\n  var items=S.shoe.colors.map(function(c){ return {label:c.n, cls:(S.colors.indexOf(c.n)>-1?\"on\":\"\"), go:function(){ toggleColorChip(c.n); }}; });\n  setQuick(items);\n}\nfunction commitColors(){\n  addUser(S.colors.length?S.colors.join(\", \"):\"Any color is fine\"); CV.done.colors=true; startSearch();\n}\nfunction toggleColorChip(n){ var i=S.colors.indexOf(n); if(i>-1)S.colors.splice(i,1); else S.colors.push(n); renderColorQuick(); updateOrder(); }\n\nfunction askConfirm(){\n  CV.step=\"confirm\"; clearQuick(); updateOrder();\n  var sum=shoeLabel()+\" &middot; \"+S.gender+\" US \"+S.size+\" &middot; ship to \"+S.zip+\" &middot; \"+(S.colors.length?S.colors.join(\", \"):\"any color\");\n  addBot(\"Here's what I've got:<br><b>\"+sum+\"</b><br>Want me to find today's lowest price?\", function(){\n    setQuick([\n      {label:\"Yes — find my price\", cls:\"go\", go:function(){ addUser(\"Yes — find my price\"); startSearch(); }},\n      {label:\"Start over\", go:function(){ addUser(\"Start over\"); startChat(); }}\n    ]);\n  });\n  setPlaceholder(\"Yes to search\");\n}\n\nfunction startSearch(){\n  CV.step=\"searching\"; clearQuick();\n  document.getElementById(\"composer\").style.display=\"none\";\n  addBot('<span class=\"srch\"><span class=\"pulse\"></span>Searching for today\\'s price across '+VENDORS.length+' sellers&hellip;</span>', function(){\n    window.afterPrices=onPriceReady;\n    findLowest();\n  });\n}\nfunction computeLowest(){\n  var gens=S.gens.slice(), cols=pickedColors(), best=null;\n  gens.forEach(function(gen){ cols.forEach(function(cn){\n    VENDORS.forEach(function(v){ var p=skuPrice(gen,cn,v);\n      if(!best||p<best.price) best={price:p,gen:gen,color:cn,vendor:v.n}; }); }); });\n  return best;\n}\nfunction onPriceReady(){\n  CV.step=\"bywhen\";\n  document.getElementById(\"composer\").style.display=\"\";\n  var b=computeLowest(); CV.low=b;\n  var lo=Math.round(b.price*0.8), hi=Math.round(b.price*0.9);\n  addBot(\"The lowest price I found today for <b>\"+S.shoe.name+\" \"+b.gen+\"</b> in size <b>\"+S.size+\"</b> is <b>$\"+b.price+\"</b> all in &mdash; shipping and taxes included.<br><br><b>Do you want me to negotiate a better deal for you?</b>\", function(){\n    setQuick([\n      {label:\"Yes\", cls:\"go\", go:function(){ addUser(\"Yes\"); askNegTime(); }},\n      {label:\"No, I'll pay retail\", go:function(){ addUser(\"No, I'll pay retail\"); payRetail(); }}\n    ]);\n  });\n  setPlaceholder(\"Yes, or I'll pay retail\");\n}\nfunction askNegTime(){\n  CV.step=\"negtime\"; clearQuick();\n  addBot(\"How much time do I have to negotiate for you? <b>The more time, the better the deal I can get.</b>\", function(){\n    setQuick([\n      {label:\"5 minutes\", go:function(){ addUser(\"5 minutes\"); canWait(0); }},\n      {label:\"1 hour\", go:function(){ addUser(\"1 hour\"); canWait(0); }},\n      {label:\"1 day\", go:function(){ addUser(\"1 day\"); canWait(1); }},\n      {label:\"1 week\", cls:\"go\", go:function(){ addUser(\"1 week\"); canWait(7); }},\n      {label:\"1 month\", go:function(){ addUser(\"1 month\"); canWait(30); }}\n    ]);\n  });\n  setPlaceholder(\"How long can I negotiate?\");\n}\nfunction payRetail(){\n  CV.step=\"done\"; clearQuick();\n  document.getElementById(\"composer\").style.display=\"none\";\n  addBot(\"No problem &mdash; today's lowest options are listed below, ready to buy now.\");\n}\nfunction needSoon(days){\n  CV.step=\"again\"; clearQuick();\n  S.deliver=new Date(Date.now()+(days||3)*864e5); updateOrder();\n  addBot(\"Got it &mdash; in that case you should <b>purchase today</b> via the links below. Do you think you'll want another pair of \"+S.shoe.name+\" in the next 2&ndash;3 months?\", function(){\n    setQuick([\n      {label:\"Yes\", cls:\"go\", go:function(){ addUser(\"Yes\"); pitchListing(); }},\n      {label:\"No\", go:function(){ addUser(\"No\"); addBot(\"All set &mdash; your lowest options are listed below, ready to buy today.\"); CV.step=\"done\"; clearQuick(); document.getElementById(\"composer\").style.display=\"none\"; }}\n    ]);\n  });\n  setPlaceholder(\"Yes or no\");\n}\nfunction canWait(days){\n  CV.step=\"done\"; clearQuick();\n  S.deliver=new Date(Date.now()+(days||7)*864e5); updateOrder();\n  addBot(\"Perfect. I'll watch the market and only buy at <b>your number</b> &mdash; let's set it now.\", function(){\n    setTimeout(function(){ if(window.LOWSKU) openWaitSave({dataset:LOWSKU}); }, 450);\n  });\n  setPlaceholder(\"\");\n}\nfunction pitchListing(skipIntro){\n  CV.step=\"done\";\n  if(!skipIntro){\n    addBot(\"Here's the better play: I can not only watch the price &mdash; if you commit to purchase I'll create a <b>listing where verified sellers come to you with their best offer</b>, and I'll only buy at your set price.\", function(){ listingCtas(); });\n  } else { listingCtas(); }\n}\nfunction listingCtas(){\n  setQuick([\n    {label:\"Name your price →\", cls:\"go\", go:function(){ if(window.LOWSKU) openWaitSave({dataset:LOWSKU}); }},\n    {label:\"Just show me today's deals\", go:function(){ document.getElementById(\"results\").scrollIntoView({block:\"nearest\"}); }}\n  ]);\n  setPlaceholder(\"\");\n}\n\nfunction chatSend(){\n  if(CV.step===\"done\"||CV.step===\"searching\") return;\n  var inp=document.getElementById(\"cin\"); var t=(inp.value||\"\").trim();\n  if(!t){\n    if(CV.step===\"gens\"){ commitGens(); }\n    else if(CV.step===\"colors\"){ commitColors(); }\n    return;\n  }\n  inp.value=\"\"; routeText(t);\n}\nfunction routeText(t){\n  if(CV.step===\"shoe\"){\n    var s=findShoe(t)||S.shoe; addUser(t);\n    if(s){ applyShoe(s); } else { addBot(\"I didn't catch that one. Try <b>Pegasus</b>, <b>Ghost</b>, <b>Skyward</b>, <b>Nimbus</b> or <b>Cloudmonster</b>.\"); }\n  } else if(CV.step===\"gens\"){\n    addUser(t);\n    if(/all|add|yes|older|expand|both|sure/i.test(t)){ S.gens=S.shoe.gens.slice(); } else { S.gens=[S.shoe.gens[0]]; }\n    CV.done.gens=true; askGender();\n  } else if(CV.step===\"gender\"){\n    addUser(t); S.gender=(/^w|women/i.test(t)?\"Women's\":\"Men's\"); CV.done.gender=true; askSize();\n  } else if(CV.step===\"size\"){\n    var mn=parseFloat(t);\n    if(!isNaN(mn)){ setSize(String(mn)); } else { addUser(t); addBot(\"Give me a number like <b>10</b> or <b>9.5</b>.\"); }\n  } else if(CV.step===\"zip\"){\n    var digits=t.replace(/[^0-9]/g,\"\");\n    if(digits.length>=5){ setZip(digits.slice(0,5)); } else { addUser(t); addBot(\"I need a 5-digit ZIP, like <b>94110</b>.\"); }\n  } else if(CV.step===\"colors\"){\n    var hit=S.shoe.colors.find(function(c){ return c.n.toLowerCase().indexOf(t.toLowerCase())>-1 || t.toLowerCase().indexOf(c.n.toLowerCase())>-1; });\n    if(hit){ toggleColorChip(hit.n); addUser(hit.n+\" added\"); }\n    else if(/any|all|no pref|whatever|don.t care/i.test(t)){ S.colors=[]; addUser(\"Any color is fine\"); CV.done.colors=true; startSearch(); }\n    else { addUser(t); addBot(\"Tap a colorway above, or say <b>any color</b>.\"); }\n  } else if(CV.step===\"confirm\"){\n    addUser(t);\n    if(/^n|start|over|edit|change/i.test(t)){ startChat(); } else { startSearch(); }\n  } else if(CV.step===\"bywhen\"){\n    addUser(t);\n    if(/^n|no|retail|pay/i.test(t)){ payRetail(); } else { askNegTime(); }\n  } else if(CV.step===\"negtime\"){\n    addUser(t);\n    var _d=/month/i.test(t)?30:/week/i.test(t)?7:/day/i.test(t)?1:0; canWait(_d);\n  } else if(CV.step===\"again\"){\n    addUser(t);\n    if(/^y|yes|sure|maybe|prob/i.test(t)){ pitchListing(); } else { addBot(\"All set &mdash; your lowest options are listed below, ready to buy today.\"); CV.step=\"done\"; clearQuick(); document.getElementById(\"composer\").style.display=\"none\"; }\n  }\n}\n\n/* ---- boot ---- */\n(function init(){\n  S.deliver=addMonths(1);\n  startChat();\n})();\n<\/script>\n\n\n
